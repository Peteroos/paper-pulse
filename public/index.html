<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="accessGate" class="access-gate" aria-labelledby="accessTitle">
      <div class="access-panel">
        <div class="brand-row">
          <div class="brand-mark">P</div>
          <div>
            <p class="brand-kicker">Daily Research</p>
            <h1 id="accessTitle">Paper Pulse</h1>
          </div>
        </div>
        <form id="accessForm" class="access-form">
          <label class="field-label" for="accessCode">访问码</label>
          <input
            id="accessCode"
            class="access-input"
            type="password"
            autocomplete="off"
            placeholder="输入访问码"
            required
          />
          <button class="primary-button" type="submit">
            <i data-lucide="lock-keyhole-open"></i>
            <span>进入网站</span>
          </button>
          <p id="accessError" class="access-error" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <div id="appShell" class="app-shell locked-content" aria-hidden="true">
      <aside class="sidebar">
        <div class="brand-row">
          <div class="brand-mark">P</div>
          <div>
            <p class="brand-kicker">Daily Research</p>
            <h1>Paper Pulse</h1>
          </div>
        </div>

        <nav class="topic-nav" id="topicNav" aria-label="论文方向"></nav>

        <section class="panel compact">
          <div class="panel-title">
            <i data-lucide="mail-plus"></i>
            <span>邮件订阅</span>
          </div>
          <form id="subscriptionForm" class="subscription-form">
            <label class="field-label" for="emailInput">邮箱</label>
            <input
              id="emailInput"
              class="email-input"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <div class="subscription-head">
              <span>感兴趣方向</span>
              <button id="selectAllTopics" type="button">全选</button>
            </div>
            <div id="subscriptionTopics" class="topic-checklist"></div>
            <button id="subscribeButton" class="secondary-button" type="submit">
              <i data-lucide="send"></i>
              <span>订阅每日推送</span>
            </button>
            <p id="subscriptionStatus" class="subscription-status" aria-live="polite"></p>
          </form>
        </section>

        <section class="panel compact saved-panel">
          <div class="panel-title">
            <i data-lucide="bookmark"></i>
            <span>已保存</span>
          </div>
          <div id="savedList" class="saved-list"></div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="date-line" id="dateLine"></p>
            <h2>今日论文推送</h2>
          </div>
          <div class="top-actions">
            <div class="search-wrap">
              <i data-lucide="search"></i>
              <input id="searchInput" type="search" placeholder="搜索标题、作者、摘要" />
            </div>
            <button id="refreshButton" class="primary-button" type="button">
              <i data-lucide="refresh-cw"></i>
              <span>刷新</span>
            </button>
          </div>
        </header>

        <div class="view-tabs" id="viewTabs" aria-label="论文视图">
          <button class="active" data-view="today" type="button">今日</button>
          <button data-view="week" type="button">本周热门</button>
          <button data-view="month" type="button">本月热门</button>
        </div>

        <section class="summary-strip" id="summaryStrip" aria-label="今日概览"></section>

        <section class="content-grid">
          <div class="paper-stream">
            <div class="stream-header">
              <div>
                <p class="section-label">Inbox</p>
                <h3 id="streamTitle">论文方向</h3>
              </div>
              <div id="fetchStatus" class="fetch-status">准备加载</div>
            </div>
            <div id="paperList" class="paper-list"></div>
          </div>

          <aside class="detail-pane" id="detailPane">
            <div class="empty-detail">
              <i data-lucide="scan-text"></i>
              <p>选择一篇论文查看摘要和链接</p>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="client.js" type="module"></script>
  </body>
</html>
